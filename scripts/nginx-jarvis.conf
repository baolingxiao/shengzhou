# Nginx 反向代理示例（Ubuntu）
# 1. 将 jarvis.example.com 改为你的域名
# 2. DNS A 记录指向服务器 IP
# 3. sudo cp scripts/nginx-jarvis.conf /etc/nginx/sites-available/jarvis
# 4. sudo ln -sf /etc/nginx/sites-available/jarvis /etc/nginx/sites-enabled/jarvis
# 5. sudo certbot --nginx -d jarvis.example.com
# 6. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name jarvis.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jarvis.example.com;

    # certbot 会自动填充以下两行
    ssl_certificate     /etc/letsencrypt/live/jarvis.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jarvis.example.com/privkey.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
